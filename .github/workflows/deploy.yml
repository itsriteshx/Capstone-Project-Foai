name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Give the workflow write access to push the gh-pages branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history so gh-pages can detect changes

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build project
        run: npm run build
        env:
          # Add any environment variables your app needs here
          NODE_ENV: production

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          # Always clean the gh-pages branch — prevents stale files from old builds
          force_orphan: true
          # Disable Jekyll so Vite's _assets folder isn't ignored
          enable_jekyll: false
          commit_message: "deploy: ${{ github.event.head_commit.message }}"
